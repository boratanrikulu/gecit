name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-bpf:
    name: Compile BPF objects
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install BPF toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm llvm-dev

      - name: Compile BPF (x86 + arm64)
        run: make -f pkg/ebpf/bpf/Makefile bpf-all

      - name: Upload BPF objects
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bpf-objects
          path: pkg/ebpf/bpf/bin/

  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    needs: build-bpf
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            cgo: 0
            tags: ""
          - os: linux
            arch: arm64
            runner: ubuntu-latest
            cgo: 0
            tags: ""
          - os: darwin
            arch: arm64
            runner: macos-latest
            cgo: 1
            tags: with_gvisor
          - os: darwin
            arch: amd64
            runner: macos-15-intel
            cgo: 1
            tags: with_gvisor
          - os: windows
            arch: amd64
            runner: windows-latest
            cgo: 1
            tags: with_gvisor

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.26'

      - name: Download BPF objects
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: bpf-objects
          path: pkg/ebpf/bpf/bin/

      - name: Install libpcap (macOS)
        if: matrix.os == 'darwin'
        run: brew install libpcap || true

      - name: Install Npcap SDK and MinGW (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $expected = "F0A8BE7778EE3AE1B99BBBECB27A3FF0F6C111A4093F1C78C5C5A099607184DB"
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-sdk-1.16.zip" -OutFile npcap-sdk.zip
          $actual = (Get-FileHash -Algorithm SHA256 npcap-sdk.zip).Hash.ToUpperInvariant()
          if ($actual -ne $expected) {
            throw "Npcap SDK checksum mismatch. Expected $expected, got $actual"
          }
          Expand-Archive npcap-sdk.zip -DestinationPath npcap-sdk
          choco install mingw -y
          echo "CGO_CFLAGS=-I${{ github.workspace }}\npcap-sdk\Include" >> $env:GITHUB_ENV
          echo "CGO_LDFLAGS=-L${{ github.workspace }}\npcap-sdk\Lib\x64 -lwpcap" >> $env:GITHUB_ENV

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        shell: bash
        run: |
          EXT=""
          if [ "${{ matrix.os }}" = "windows" ]; then EXT=".exe"; fi
          TAGS=""
          if [ -n "${{ matrix.tags }}" ]; then TAGS="-tags ${{ matrix.tags }}"; fi
          go build -ldflags="-s -w" $TAGS -o gecit-${{ matrix.os }}-${{ matrix.arch }}${EXT} ./cmd/gecit

      - name: Upload binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gecit-${{ matrix.os }}-${{ matrix.arch }}
          path: gecit-${{ matrix.os }}-${{ matrix.arch }}*

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Download all binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release/
          for dir in artifacts/gecit-*/; do
            for file in "$dir"*; do
              [ -f "$file" ] || continue
              name=$(basename "$file")
              cp "$file" "release/$name"
              chmod +x "release/$name"
              sha256sum "release/$name" >> release/checksums.txt
            done
          done

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-checksums: release/checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          generate_release_notes: true
          files: |
            release/gecit-linux-amd64
            release/gecit-linux-arm64
            release/gecit-darwin-amd64
            release/gecit-darwin-arm64
            release/gecit-windows-amd64.exe
            release/checksums.txt
