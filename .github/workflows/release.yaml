name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-bpf:
    name: Compile BPF objects
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install BPF toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm llvm-dev

      - name: Compile BPF (x86 + arm64)
        run: make -f pkg/ebpf/bpf/Makefile bpf-all

      - name: Upload BPF objects
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bpf-objects
          path: pkg/ebpf/bpf/bin/

  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    needs: build-bpf
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            cgo: 0
            tags: ""
          - os: linux
            arch: arm64
            runner: ubuntu-latest
            cgo: 0
            tags: ""
          - os: darwin
            arch: arm64
            runner: macos-latest
            cgo: 1
            tags: with_gvisor
          - os: darwin
            arch: amd64
            runner: macos-15-intel
            cgo: 1
            tags: with_gvisor
          - os: windows
            arch: amd64
            runner: windows-latest
            cgo: 1
            tags: with_gvisor

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'

      - name: Download BPF objects
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: bpf-objects
          path: pkg/ebpf/bpf/bin/

      - name: Install libpcap (macOS)
        if: matrix.os == 'darwin'
        run: brew install libpcap || true

      - name: Install Npcap SDK and MinGW (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-sdk-1.13.zip" -OutFile npcap-sdk.zip
          if ((Get-FileHash npcap-sdk.zip -Algorithm SHA256).Hash.ToLower() -ne "dad1f2bf1b02b787be08ca4862f99e39a876c1f274bac4ac0cedc9bbc58f94fd") {
            throw "Npcap SDK checksum mismatch"
          }
          Expand-Archive npcap-sdk.zip -DestinationPath npcap-sdk
          choco install mingw --version=13.2.0 -y
          echo "CGO_CFLAGS=-I${{ github.workspace }}\npcap-sdk\Include" >> $env:GITHUB_ENV
          echo "CGO_LDFLAGS=-L${{ github.workspace }}\npcap-sdk\Lib\x64 -lwpcap" >> $env:GITHUB_ENV

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        shell: bash
        run: |
          EXT=""
          if [ "${{ matrix.os }}" = "windows" ]; then EXT=".exe"; fi
          TAGS=""
          if [ -n "${{ matrix.tags }}" ]; then TAGS="-tags ${{ matrix.tags }}"; fi
          go build -trimpath -mod=readonly -ldflags="-s -w" $TAGS -o gecit-${{ matrix.os }}-${{ matrix.arch }}${EXT} ./cmd/gecit

      - name: Upload binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gecit-${{ matrix.os }}-${{ matrix.arch }}
          path: gecit-${{ matrix.os }}-${{ matrix.arch }}*

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download all binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release/
          for dir in artifacts/gecit-*/; do
            for file in "$dir"*; do
              [ -f "$file" ] || continue
              name=$(basename "$file")
              cp "$file" "release/$name"
              chmod +x "release/$name"
              sha256sum "release/$name" >> release/checksums.txt
            done
          done

      - name: Attest release assets
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: release/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: |
            release/gecit-linux-amd64
            release/gecit-linux-arm64
            release/gecit-darwin-amd64
            release/gecit-darwin-arm64
            release/gecit-windows-amd64.exe
            release/checksums.txt
